services:
  web:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: Voter_hak.settings
      DEBUG: "False"
      DATA_DIR: /data
      SQLITE_PATH: /data/db.sqlite3
      STATIC_ROOT: /data/static
      MEDIA_ROOT: /data/media
      BOT_WEBHOOK_URL: http://bot:8080/new-quiz-webhook
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost}
    volumes:
      - app_data:/data
    expose:
      - "8000"

  bot:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: Voter_hak.settings
      DATA_DIR: /data
      SQLITE_PATH: /data/db.sqlite3
      STATIC_ROOT: /data/static
      MEDIA_ROOT: /data/media
      SKIP_DJANGO_BOOTSTRAP: "1"
    command: ["python", "bot/main.py"]
    volumes:
      - app_data:/data
    expose:
      - "8080"
    depends_on:
      - web

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - app_data:/data:ro

volumes:
  app_data:
